# ===========================================
# RAG 知识库业务参数
# ===========================================
# 这些参数会随调优而变化，与具体环境无关
# 部署相关配置走 .env，不要写在这里
# ===========================================

# ===== 文档切片 =====
chunk_size: 800          # 每个 chunk 的 token 数
chunk_overlap: 100       # chunk 之间的重叠 token
max_chunk_per_doc: 200   # 单文档最大切片数

# ===== 检索 =====
top_k: 30                # 向量检索召回数量
rerank_n: 5              # rerank 后保留数量
min_score: 0.5           # 最低相似度阈值（低于此值触发"知识缺口"）

# ===== LLM 推理 =====
temperature: 0.3         # 生成温度（低 = 更确定）
max_tokens: 2000         # 单次生成最大 token
llm_timeout: 60          # 调用超时（秒）
llm_max_retries: 2       # 失败重试次数

# ===== Agent =====
router_confidence_threshold: 0.7  # Router 意图识别置信度阈值

# ===== 入库 =====
ingest_concurrency: 5    # 批量入库并发数
ppt_image_dpi: 100       # PPT 转图分辨率

# ===== 客户主数据 =====
customer_master_excel_path: data/customer_master_init_sample.xlsx
customer_match_fuzzy_threshold: 80
customer_match_limit: 5

# ===== 知识缺口 =====
gap_log_threshold: 0.5   # 检索分数低于此值记录到 knowledge_gaps
